<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elska</title>
  <link rel="icon" href="images/AppIcon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>

    <div id="title-screen">
      <h1>Elska</h1>
      <p class="studio">
        <span class="j">J</span><span class="a">A</span> games
      </p>

      <div id="play-stack">
        <img id="app-icon" src="images/AppIcon.png" alt="Elska app icon">
        <button id="play-btn">Play</button>
      </div>
    </div>

    <div id="game-container">
      <iframe id="game-frame" title="Elska game"></iframe>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
